name: quantity-measurement

services:
  postgres:
    image: postgres:16-alpine
    container_name: qma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantity_measurement}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - qma_postgres_data:/var/lib/postgresql/data
    ports:
      - "${QMA_POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quantity_measurement}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qma-auth:
    build:
      context: ./QMA-Auth
    image: ${QMA_AUTH_IMAGE:-qma-auth:local}
    container_name: qma-auth
    restart: unless-stopped
    environment:
      QMA_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-quantity_measurement}
      QMA_DB_USERNAME: ${POSTGRES_USER:-postgres}
      QMA_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      QMA_JWT_SECRET: ${QMA_JWT_SECRET}
      QMA_JWT_EXPIRATION_MS: ${QMA_JWT_EXPIRATION_MS:-3600000}
      QMA_FRONTEND_ORIGIN: ${QMA_FRONTEND_ORIGIN}
      QMA_OAUTH2_REDIRECT_URI: ${QMA_OAUTH2_REDIRECT_URI}
      QMA_GOOGLE_AUTH_REDIRECT_URI: ${QMA_GOOGLE_AUTH_REDIRECT_URI}
      QMA_CORS_ALLOWED_ORIGINS: ${QMA_CORS_ALLOWED_ORIGINS}
      QMA_COOKIE_SECURE: ${QMA_COOKIE_SECURE:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  qma-service:
    build:
      context: ./QMA-Service
    image: ${QMA_SERVICE_IMAGE:-qma-service:local}
    container_name: qma-service
    restart: unless-stopped
    environment:
      QMA_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-quantity_measurement}
      QMA_DB_USERNAME: ${POSTGRES_USER:-postgres}
      QMA_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6000:6000"

  qma-api:
    build:
      context: ./QMA-API
    image: ${QMA_API_IMAGE:-qma-api:local}
    container_name: qma-api-gateway
    restart: unless-stopped
    environment:
      QMA_AUTH_BASE_URL: ${QMA_DOCKER_AUTH_BASE_URL:-http://qma-auth:5000}
      QMA_SERVICE_BASE_URL: ${QMA_DOCKER_SERVICE_BASE_URL:-http://qma-service:6000}
      QMA_CORS_ALLOWED_ORIGINS: ${QMA_CORS_ALLOWED_ORIGINS}
      QMA_JWT_SECRET: ${QMA_JWT_SECRET}
    depends_on:
      - qma-auth
      - qma-service
    ports:
      - "4000:4000"

  qma-client:
    build:
      context: ./QMA-Client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: ${QMA_CLIENT_IMAGE:-qma-client:local}
    container_name: qma-client
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - qma-api
    ports:
      - "8000:80"

volumes:
  qma_postgres_data:
