server.port=5000
spring.application.name=qma-auth
server.forward-headers-strategy=framework

spring.datasource.url=${QMA_DB_URL:jdbc:postgresql://127.0.0.1:5432/quantity_measurement}
spring.datasource.username=${QMA_DB_USERNAME:}
spring.datasource.password=${QMA_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.jwt.secret=${QMA_JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}
app.jwt.expiration-ms=${QMA_JWT_EXPIRATION_MS:3600000}
app.auth.cookie.secure=${QMA_COOKIE_SECURE:false}

app.oauth2.redirect-uri=${QMA_OAUTH2_REDIRECT_URI:http://localhost:8000/oauth/callback}
app.oauth2.frontend-origin=${QMA_FRONTEND_ORIGIN:http://localhost:8000}
app.cors.allowed-origins=${QMA_CORS_ALLOWED_ORIGINS:http://localhost:8000,http://127.0.0.1:8000}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${QMA_GOOGLE_AUTH_REDIRECT_URI:http://localhost:4000/login/oauth2/code/google}

logging.level.org.springframework.security=INFO
