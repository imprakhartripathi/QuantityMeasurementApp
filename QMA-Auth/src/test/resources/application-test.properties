spring.datasource.url=jdbc:h2:mem:qmaauthdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics

app.jwt.secret=test-secret-key-for-jwt-must-be-at-least-32-bytes
app.jwt.expiration-ms=3600000
app.oauth2.redirect-uri=http://localhost:8000/oauth/callback
app.oauth2.frontend-origin=http://localhost:8000

spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email
