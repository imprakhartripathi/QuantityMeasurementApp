spring.application.name=qma-api-gateway
server.port=4000
server.forward-headers-strategy=framework

spring.cloud.gateway.server.webflux.routes[0].id=qma-auth-api
spring.cloud.gateway.server.webflux.routes[0].uri=${QMA_AUTH_BASE_URL:http://localhost:5000}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**,/oauth2/**,/login/oauth2/**

spring.cloud.gateway.server.webflux.routes[1].id=qma-user-history-api
spring.cloud.gateway.server.webflux.routes[1].uri=${QMA_SERVICE_BASE_URL:http://localhost:6000}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/users/me/history

spring.cloud.gateway.server.webflux.routes[2].id=qma-service-api
spring.cloud.gateway.server.webflux.routes[2].uri=${QMA_SERVICE_BASE_URL:http://localhost:6000}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/quantities/**,/api/v1/health/**

spring.cloud.gateway.server.webflux.routes[3].id=qma-user-api
spring.cloud.gateway.server.webflux.routes[3].uri=${QMA_AUTH_BASE_URL:http://localhost:5000}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOriginPatterns=${QMA_CORS_ALLOWED_ORIGINS:http://localhost:8000,http://127.0.0.1:8000}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Headers Access-Control-Allow-Methods

app.jwt.secret=${QMA_JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}

spring.cloud.discovery.enabled=false
spring.cloud.discovery.blocking.enabled=false
spring.cloud.discovery.reactive.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false
spring.cloud.refresh.enabled=false

spring.autoconfigure.exclude=org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration,org.springframework.cloud.autoconfigure.RefreshAutoConfiguration,org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration,org.springframework.cloud.client.discovery.composite.CompositeDiscoveryClientAutoConfiguration,org.springframework.cloud.client.discovery.composite.reactive.ReactiveCompositeDiscoveryClientAutoConfiguration
