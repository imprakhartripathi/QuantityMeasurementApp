server.port=8080

spring.datasource.url=${QMA_DB_URL:jdbc:postgresql://127.0.0.1:5432/quantity_measurement}
spring.datasource.username=${QMA_DB_USERNAME:}
spring.datasource.password=${QMA_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.jwt.secret=${QMA_JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}
app.jwt.expiration-ms=${QMA_JWT_EXPIRATION_MS:3600000}

app.oauth2.redirect-uri=${QMA_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
app.oauth2.frontend-origin=${QMA_FRONTEND_ORIGIN:http://localhost:5173}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

logging.level.org.springframework.security=INFO
