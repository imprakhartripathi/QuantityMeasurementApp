name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - dev
      - feature/**
    paths:
      - QMA-API/**
      - QMA-Auth/**
      - QMA-Service/**
      - QMA-Client/**
      - docker-compose.yml
      - .github/workflows/docker-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: QMA-API
            dockerfile: QMA-API/Dockerfile
            image: qma-api
          - context: QMA-Auth
            dockerfile: QMA-Auth/Dockerfile
            image: qma-auth
          - context: QMA-Service
            dockerfile: QMA-Service/Dockerfile
            image: qma-service
          - context: QMA-Client
            dockerfile: QMA-Client/Dockerfile
            image: qma-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive lowercase owner
        id: vars
        shell: bash
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:4000' }}
